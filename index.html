<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequoia Guild Raids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #58a6ff;
    margin-bottom: 16px;
  }

  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .week-nav button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .week-nav button:hover:not(:disabled) { background: #30363d; }
  .week-nav button:disabled { opacity: 0.3; cursor: default; }

  .week-label {
    font-size: 1.05rem;
    font-weight: 600;
    min-width: 280px;
    text-align: center;
  }

  .week-label span { color: #8b949e; font-weight: 400; }

  .subtitle {
    color: #8b949e;
    font-size: 0.85rem;
    margin-top: 6px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: #161b22;
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: #8b949e;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { color: #e6edf3; }
  .tab.active { background: #21262d; color: #e6edf3; }

  .tab[data-tab="ALL"].active { color: #58a6ff; }
  .tab[data-tab="TCC"].active { color: #9e9e9e; }
  .tab[data-tab="NOL"].active { color: #58a6ff; }
  .tab[data-tab="NOTG"].active { color: #2ea043; }
  .tab[data-tab="TNA"].active { color: #8957e5; }
  .tab[data-tab="TWP"].active { color: #22d3ee; }

  .leaderboard {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    overflow: hidden;
  }

  .lb-header {
    display: grid;
    grid-template-columns: 48px 1fr 100px;
    padding: 12px 16px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #21262d;
  }

  .lb-row {
    display: grid;
    grid-template-columns: 48px 1fr 100px;
    padding: 12px 16px;
    align-items: center;
    border-bottom: 1px solid #21262d14;
    transition: background 0.1s;
  }

  .lb-row:hover { background: #1c2128; }
  .lb-row:last-child { border-bottom: none; }

  .rank {
    font-weight: 700;
    font-size: 0.95rem;
  }

  .rank-1 { color: #ffd700; }
  .rank-2 { color: #c0c0c0; }
  .rank-3 { color: #cd7f32; }

  .player-name {
    font-weight: 500;
    font-size: 0.95rem;
  }

  .delta {
    text-align: right;
    font-weight: 700;
    font-size: 0.95rem;
    color: #7ee787;
  }

  .empty-state {
    padding: 48px 16px;
    text-align: center;
    color: #8b949e;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    font-size: 0.85rem;
    color: #8b949e;
  }

  .stats-bar strong { color: #e6edf3; }

  .loading {
    text-align: center;
    padding: 64px 16px;
    color: #8b949e;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.4rem; }
    .week-label { min-width: 200px; font-size: 0.9rem; }
    .lb-header, .lb-row { grid-template-columns: 40px 1fr 80px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Sequoia Guild Raids</h1>
    <div class="week-nav">
      <button id="prev-week" title="Previous week">&#8592;</button>
      <div class="week-label" id="week-label">Loading...</div>
      <button id="next-week" title="Next week">&#8594;</button>
    </div>
    <div class="subtitle" id="subtitle"></div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="ALL">ALL</button>
    <button class="tab" data-tab="TCC">TCC</button>
    <button class="tab" data-tab="NOL">NOL</button>
    <button class="tab" data-tab="NOTG">NOTG</button>
    <button class="tab" data-tab="TNA">TNA</button>
    <button class="tab" data-tab="TWP">TWP</button>
  </div>

  <div class="leaderboard" id="leaderboard">
    <div class="loading">Loading data...</div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div style="text-align:center; margin-top: 20px;">
    <button id="copy-btn" style="
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    " onmouseover="this.style.background='#30363d'" onmouseout="this.style.background='#21262d'">
      Copy sharable leaderboard
    </button>
  </div>
</div>

<script>
const BASE = '.';

let meta = null;
let currentWeekData = null;
let weekIndex = 0;
let allWeeks = [];
let activeTab = 'ALL';
let cache = {};

async function fetchJSON(url) {
  const resp = await fetch(url + '?t=' + Date.now());
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function init() {
  try {
    meta = await fetchJSON(`${BASE}/data/meta.json`);
  } catch (e) {
    document.getElementById('leaderboard').innerHTML = '<div class="empty-state">Could not load data. Is the scraper running?</div>';
    return;
  }

  // Build week list: archived + current, deduplicated, newest first
  const weekSet = new Set([...(meta.available_weeks || []), meta.current_week]);
  allWeeks = [...weekSet].sort().reverse();

  // Default: show most recent. But if within 24h of week start, show previous completed week.
  const now = new Date();
  const weekStart = new Date(meta.week_start);
  const hoursSinceStart = (now - weekStart) / 3600000;
  if (hoursSinceStart < 24 && allWeeks.length > 1) {
    weekIndex = 1;
  } else {
    weekIndex = 0;
  }

  setupTabs();
  setupNav();
  await loadWeek();
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      render();
    });
  });
}

function setupNav() {
  document.getElementById('prev-week').addEventListener('click', async () => {
    if (weekIndex < allWeeks.length - 1) {
      weekIndex++;
      await loadWeek();
    }
  });
  document.getElementById('next-week').addEventListener('click', async () => {
    if (weekIndex > 0) {
      weekIndex--;
      await loadWeek();
    }
  });
}

async function loadWeek() {
  const weekKey = allWeeks[weekIndex];
  document.getElementById('prev-week').disabled = weekIndex >= allWeeks.length - 1;
  document.getElementById('next-week').disabled = weekIndex <= 0;

  if (weekKey === meta.current_week) {
    await loadCurrentWeek();
  } else {
    await loadArchivedWeek(weekKey);
  }

  render();
}

async function loadCurrentWeek() {
  try {
    const [baseline, latest] = await Promise.all([
      fetchJSON(`${BASE}/data/baseline.json`),
      fetchJSON(`${BASE}/data/latest.json`),
    ]);

    const { leaderboards, totalRaids } = computeLeaderboards(baseline.players, latest.players);
    const totalPlayers = Object.keys(latest.players).length;
    const activePlayers = leaderboards.ALL.length;

    const weekStart = new Date(meta.week_start);
    const weekEnd = new Date(weekStart.getTime() + 7 * 86400000);
    const label = formatDateRange(weekStart, weekEnd);
    const daysElapsed = Math.max(1, (Date.now() - weekStart.getTime()) / 86400000);
    const raidsPerDay = Math.round(totalRaids / 4 / daysElapsed);

    currentWeekData = {
      week: meta.current_week,
      label,
      leaderboards,
      total_players: totalPlayers,
      active_players: activePlayers,
      total_raids: totalRaids,
      raids_per_day: raidsPerDay,
      last_scrape: meta.last_scrape,
      is_current: true,
    };
  } catch (e) {
    currentWeekData = null;
  }
}

async function loadArchivedWeek(weekKey) {
  if (!cache[weekKey]) {
    try {
      cache[weekKey] = await fetchJSON(`${BASE}/data/weeks/${weekKey}.json`);
    } catch (e) {
      cache[weekKey] = null;
    }
  }
  currentWeekData = cache[weekKey];
  if (currentWeekData) currentWeekData.is_current = false;
}

function computeLeaderboards(baseline, latest) {
  const raidTypes = ['tcc', 'nol', 'notg', 'tna', 'twp'];
  const deltas = { ALL: [], TCC: [], NOL: [], NOTG: [], TNA: [], TWP: [] };
  let totalRaids = 0;

  for (const player of Object.keys(latest)) {
    if (!baseline[player]) continue; // New player, no baseline — skip
    const end = latest[player];
    const start = baseline[player];
    let total = 0;

    for (const rt of raidTypes) {
      let diff = (end[rt] || 0) - (start[rt] || 0);
      if (diff < 0) diff = 0; // data reset, can't determine delta
      if (diff > 0) {
        deltas[rt.toUpperCase()].push({ name: player, delta: diff });
        total += diff;
      }
    }

    if (total > 0) {
      deltas.ALL.push({ name: player, delta: total });
      totalRaids += total;
    }
  }

  for (const key of Object.keys(deltas)) {
    deltas[key].sort((a, b) => b.delta - a.delta);
    deltas[key] = deltas[key].slice(0, 10);
  }

  return { leaderboards: deltas, totalRaids };
}

function formatDateRange(start, end) {
  // Boundaries are Sunday 23:00 UTC = Monday 01:00 CEST
  // Add 2h to show the Monday date in CEST
  const s = new Date(start.getTime() + 2 * 3600000);
  const e = new Date(end.getTime() + 2 * 3600000);
  const opts = { month: 'short', day: 'numeric' };
  return `${s.toLocaleDateString('en-US', opts)} \u2013 ${e.toLocaleDateString('en-US', { ...opts, year: 'numeric' })}`;
}

function timeAgo(isoString) {
  const diff = Date.now() - new Date(isoString).getTime();
  const hours = Math.floor(diff / 3600000);
  const mins = Math.floor(diff / 60000);
  if (hours > 24) return `${Math.floor(hours / 24)}d ago`;
  if (hours > 0) return `${hours}h ago`;
  return `${mins}m ago`;
}

function render() {
  const lb = document.getElementById('leaderboard');
  const label = document.getElementById('week-label');
  const subtitle = document.getElementById('subtitle');
  const statsBar = document.getElementById('stats-bar');

  if (!currentWeekData) {
    lb.innerHTML = '<div class="empty-state">No data for this week</div>';
    label.textContent = allWeeks[weekIndex] || 'Unknown';
    subtitle.textContent = '';
    statsBar.innerHTML = '';
    return;
  }

  const d = currentWeekData;
  const weekNum = (d.week || allWeeks[weekIndex]).replace(/^\d{4}-W0?/, 'Week ');
  label.innerHTML = `${weekNum} <span>(${d.label})</span>`;

  if (d.is_current && d.last_scrape) {
    subtitle.textContent = `Live \u2022 Updated ${timeAgo(d.last_scrape)}`;
  } else {
    subtitle.textContent = 'Final';
  }

  const entries = d.leaderboards[activeTab] || [];

  if (entries.length === 0) {
    lb.innerHTML = '<div class="empty-state">No raids recorded yet</div>';
    statsBar.innerHTML = '';
    return;
  }

  let html = `<div class="lb-header"><div>#</div><div>Player</div><div style="text-align:right">Raids</div></div>`;
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const rankClass = i < 3 ? ` rank-${i + 1}` : '';
    html += `<div class="lb-row">
      <div class="rank${rankClass}">${i + 1}</div>
      <div class="player-name">${escapeHtml(e.name)}</div>
      <div class="delta">+${e.delta.toLocaleString()}</div>
    </div>`;
  }
  lb.innerHTML = html;

  let rpd = d.raids_per_day;
  if (!rpd && d.total_raids) {
    rpd = Math.round(d.total_raids / 4 / 7);
  } else if (!rpd && d.leaderboards && d.leaderboards.ALL) {
    const total = d.leaderboards.ALL.reduce((s, e) => s + e.delta, 0);
    rpd = Math.round(total / 4 / 7);
  }

  statsBar.innerHTML = `
    <div><strong>${d.total_players || '?'}</strong> members</div>
    <div><strong>${d.active_players || '?'}</strong> active raiders</div>
    ${rpd ? `<div>~<strong>${rpd.toLocaleString()}</strong> raids/day</div>` : ''}
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Discord role IDs for raid type #1 winners
const RAID_ROLE_IDS = {
  NOTG: '1353722648626073721',
  NOL: '1353722763184967753',
  TCC: '1353722823570624563',
  TNA: '1353722882626162698',
  TWP: '1491567498267590789',
};

const MEDALS = ['\u{1F947}', '\u{1F948}', '\u{1F949}']; // gold, silver, bronze

function buildShareableText() {
  if (!currentWeekData) return null;
  const d = currentWeekData;
  const raidOrder = ['NOTG', 'NOL', 'TCC', 'TNA', 'TWP'];
  let lines = [];

  lines.push('# **<:Aspect:1351246116024352818> Weekly Guild Raid Leaderboard <:Aspect:1351246116024352818>**');
  lines.push('');

  for (const raid of raidOrder) {
    const entries = d.leaderboards[raid] || [];
    if (entries.length === 0) continue;

    lines.push(`**${raid}**`);
    for (let i = 0; i < Math.min(3, entries.length); i++) {
      const e = entries[i];
      const medal = MEDALS[i];
      const rolePing = (i === 0 && RAID_ROLE_IDS[raid]) ? ` <@&${RAID_ROLE_IDS[raid]}>` : '';
      const prefix = i === 0 ? '- ' : ' - ';
      lines.push(`${prefix}${medal}${e.name} - ${e.delta}${rolePing}`);
    }
    lines.push('');
  }

  lines.push('_Please message me for your role color_');

  return lines.join('\n');
}

document.getElementById('copy-btn').addEventListener('click', async () => {
  const text = buildShareableText();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy sharable leaderboard'; }, 2000);
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy sharable leaderboard'; }, 2000);
  }
});

init();
</script>
</body>
</html>
